<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerFit Gym | Member Login</title>
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-logo">
                <h1>Power<span>Fit</span></h1>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="Home.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
                <li class="nav-item"><a href="Contact.html" class="nav-link">Contact</a></li>
                <li class="nav-item"><a href="admin.html" class="nav-link">Admin</a></li>
                <li class="nav-item"><a href="join.html" class="btn-primary" style="padding: 0.6rem 1.5rem">Join Now</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-box fade-in-up">
            <h2>MEMBER <span>LOGIN</span></h2>
            <p class="auth-subtitle">Access your personalized training portal</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your registered email" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                
                <div class="checkbox-group" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#" style="color: var(--primary-color); font-size: 0.9rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
                
                <div class="form-footer">
                    Not a member yet? <a href="join.html">Join PowerFit today</a>
                </div>
            </form>
        </div>
    </main>

    <script src="./Login.js"></script>
    <script>
        // Hamburger Menu functionality
        document.querySelector('.hamburger').addEventListener('click', function() {
            this.classList.toggle('active');
            document.querySelector('.nav-menu').classList.toggle('active');
        });
    </script>
</body>
</html>
