<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerFit Gym | Registration</title>
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-logo">
                <h1>Power<span>Fit</span></h1>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="Home.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
                <li class="nav-item"><a href="Contact.html" class="nav-link">Contact</a></li>
                <li class="nav-item"><a href="admin.html" class="nav-link">Admin</a></li>
                <li class="nav-item"><a href="log.html" class="btn-secondary" style="padding: 0.6rem 1.5rem">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-box fade-in-up" style="max-width: 650px;">
            <h2>JOIN <span>POWERFIT</span></h2>
            <p class="auth-subtitle">Transform Your Body, Transform Your Life</p>
            
            <form id="registration-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number">
                    </div>
                    
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" style="color-scheme: dark;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="gender">Gender</label>
                    <select id="gender">
                        <option value="" disabled selected>Select your gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <h3 style="font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">Select Membership</h3>
                
                <div class="membership-options">
                    <div class="membership-option" onclick="selectMembership(this, 'Basic')">
                        <h3>Basic</h3>
                        <div class="membership-price"><span>₹</span>999</div>
                        <p style="margin:0; font-size: 0.8rem;">Monthly</p>
                    </div>
                    
                    <div class="membership-option selected" onclick="selectMembership(this, 'Premium')">
                        <h3>Premium</h3>
                        <div class="membership-price"><span>₹</span>1999</div>
                        <p style="margin:0; font-size: 0.8rem;">Monthly</p>
                    </div>
                    
                    <div class="membership-option" onclick="selectMembership(this, 'Elite')">
                        <h3>Elite</h3>
                        <div class="membership-price"><span>₹</span>2999</div>
                        <p style="margin:0; font-size: 0.8rem;">Monthly</p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="goals">Fitness Goals</label>
                    <select id="goals">
                        <option value="" disabled selected>Select your primary goal</option>
                        <option value="weight-loss">Weight Loss</option>
                        <option value="muscle-gain">Muscle Gain</option>
                        <option value="endurance">Endurance Training</option>
                        <option value="flexibility">Flexibility & General Health</option>
                    </select>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <input type="password" id="password" placeholder="Secure password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm password" required>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the Terms and Conditions to dedicate myself to fitness.</label>
                </div>
                
                <a href="./new.html" class="btn-primary" style="display: block; width: 100%; text-align: center; margin-top: 1rem;">Complete Registration</a>
                
                <div class="form-footer">
                    Already a member? <a href="./log.html">Log in here</a>
                </div>
            </form>
        </div>
    </main>

    <script src="./join.js"></script>
    <script>
        // Local UI script to handle membership selection highlight
        function selectMembership(element, planName) {
            document.querySelectorAll('.membership-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        // Hamburger Menu functionality
        document.querySelector('.hamburger').addEventListener('click', function() {
            this.classList.toggle('active');
            document.querySelector('.nav-menu').classList.toggle('active');
        });
    </script>
</body>
</html>
